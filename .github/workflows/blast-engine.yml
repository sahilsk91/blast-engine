name: B.L.A.S.T V10 Global Extractor

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      query:
        description: 'Niche / Role (e.g. Lawyer, Plumber, CEO)'
        required: true
      count:
        description: 'Target leads per city (Max 100 for stability)'
        default: '50'
      locations:
        description: 'Locations (comma-separated, e.g. "Houston, Austin, Dallas")'
        required: true
        default: 'Houston'
      mode:
        description: 'Extraction Mode'
        type: choice
        options:
          - V10 Stealth X-Ray Person Logic (--person)
          - V5 Horizontal Business Scrape (Standard)
          - V9 Omniscience Mode (--omniscience)
        default: 'V5 Horizontal Business Scrape (Standard)'

permissions:
  issues: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      locations_json: ${{ steps.set-matrix.outputs.locations }}
      query: ${{ steps.set-matrix.outputs.query }}
      count: ${{ steps.set-matrix.outputs.count }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "issues" ]; then
            # Format expected: Niche in City1, City2 - Count
            # Example: Dentists in Miami, Orlando - 50
            TITLE="${{ github.event.issue.title }}"
            QUERY=$(echo "$TITLE" | awk -F' in ' '{print $1}')
            LOCS_AND_COUNT=$(echo "$TITLE" | awk -F' in ' '{print $2}')
            LOCATIONS=$(echo "$LOCS_AND_COUNT" | awk -F' - ' '{print $1}')
            COUNT=$(echo "$LOCS_AND_COUNT" | awk -F' - ' '{print $2}')
            
            # Defaults if parsing fails
            if [ -z "$QUERY" ]; then QUERY="Business"; fi
            if [ -z "$COUNT" ]; then COUNT="20"; fi
            if [ -z "$LOCATIONS" ]; then LOCATIONS="Austin"; fi
          else
            # Manual workflow dispatch
            QUERY="${{ github.event.inputs.query }}"
            COUNT="${{ github.event.inputs.count }}"
            LOCATIONS="${{ github.event.inputs.locations }}"
          fi
          
          echo "query=$QUERY" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          IFS=',' read -r -a array <<< "$LOCATIONS"
          json_array="["
          for i in "${!array[@]}"; do
            city="$(echo -e "${array[i]}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            json_array+="\"$city\""
            if [ $i -lt $(( ${#array[@]} - 1 )) ]; then
              json_array+=","
            fi
          done
          json_array+="]"
          echo "locations=$json_array" >> $GITHUB_OUTPUT

  run-blast-engine:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        location: ${{ fromJson(needs.setup-matrix.outputs.locations_json) }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install System Dependencies (Tesseract OCR)
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-eng libtesseract-dev

    - name: Install Python Dependencies
      run: |
        pip install requests beautifulsoup4 fake-useragent pandas openai httpx duckduckgo-search dnspython python-whois pytesseract Pillow aiohttp pydantic
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        

    
    - name: Execute B.L.A.S.T Engine (Location ${{ matrix.location }})
      env:
        NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      run: |
        mkdir -p exports
        
        QUERY="${{ needs.setup-matrix.outputs.query }}"
        COUNT="${{ needs.setup-matrix.outputs.count }}"
        MODE="V5 Horizontal Business Scrape (Standard)"
        LOCATION="${{ matrix.location }}"
        
        FLAGS="--count $COUNT"
        
        if [[ "$MODE" == *"--person"* ]]; then
          FLAGS="$FLAGS --person --location \"$LOCATION\""
        elif [[ "$MODE" == *"--omniscience"* ]]; then
          FLAGS="$FLAGS --omniscience"
        fi
        
        echo "Executing: python tools/lead_gen.py \"$QUERY\" $FLAGS"
        eval "python tools/lead_gen.py \"$QUERY\" $FLAGS"

    - name: Upload Leads Payload (CSV)
      uses: actions/upload-artifact@v4
      with:
        name: blast-leads-${{ matrix.location }}
        path: exports/*.csv

  commit-database:
    needs: [setup-matrix, run-blast-engine]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install pandas

    - name: Download all Lead Artifacts
      uses: actions/download-artifact@v4
      with:
        path: exports/

    - name: Merge Leads into Database
      run: python tools/merge_db.py exports/*/*.csv

    - name: Commit and Push Database
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add leads_db.sqlite
        git diff --quiet && git diff --staged --quiet || (git commit -m "Autosync deduplication database" && git push)

    - name: Comment on Issue
      if: github.event_name == 'issues'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
      run: |
        gh issue comment $ISSUE_NUMBER -b "🚀 **Global Extraction Complete!**
        
        The headless nodes have successfully dropped the payload and synchronized the pristine cross-run deduplication database. You can download all your fresh CSVs from the top of the [Actions Run Page](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."
